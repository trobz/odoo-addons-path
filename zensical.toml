[project]
site_name = "odoo-addons-path"
site_url = "https://trobz.github.io/odoo-addons-path/"
site_description = "Automatically detect and construct Odoo addons_path for Trobz, C2C, Odoo.sh, Doodba, and generic layouts."
site_author = "Trobz"
copyright = "Copyright &copy; 2026 Trobz"
docs_dir = "docs"
site_dir = "site"
extra_css = ["stylesheets/hero.css", "stylesheets/site.css"]

nav = [
  { Home = "index.md" },
  { "Getting Started" = "getting-started.md" },
  { "CLI Reference" = "cli-reference.md" },
  { "Python API" = "python-api.md" },
  { "Supported Layouts" = "supported-layouts.md" },
  { Architecture = "system-architecture.md" },
  { "Code Standards" = "code-standards.md" },
]

[[project.extra_javascript]]
path = "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"
defer = true

[[project.extra_javascript]]
path = "javascripts/hero-scene.js"
defer = true

[project.theme]
name = "modern"
custom_dir = "overrides"
language = "en"
features = [
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.theme.icon]
logo = "lucide/terminal"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/trobz/odoo-addons-path"
